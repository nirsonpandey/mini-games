<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>number guessing game</title>
    <style>
*{
    font-family: Arial, Helvetica, sans-serif;
    font-size: 20px;
    background-color: #b8ddee;
   
}
h2{
    width:75%;
    margin: 20px auto;
    background-color: aliceblue;
    padding: 10px;
    border-radius: 5px;
    text-align: center;
    font-family:serif;
    font-size: 30px;
   text-shadow: 2px 2px 2px rgb(13, 155, 190);
}
#guess{
    display: flex;
    justify-content: center;
    margin-top: 20px;
    border:8px solid rgb(255, 254, 254);
}
#box {
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border: 3px solid black;
  border-radius: 12px;
  background-color: white;
  box-shadow: 20px 40px 20px rgba(255, 0, 149, 0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

    </style>

</head>
<body>
   <h2>Guess a number between 1 and 100</h2><br><br> <br>
   
   <div id="box">
    <input type="number" id="guess"
   placeholder="Enter your guess" >
    <button onclick="checkGuess()">Submit</button>
    
    <p id="result"></p>
    <p id="tries">Tries: 0</p>
    </div>
    <script>
        const randomNumber = Math.floor(Math.random() * 100) + 1;
        let tries=0;
        function checkGuess() {
                tries++;
                document.getElementById('tries').textContent = 'Tries: ' + tries;

                if(tries>10){
                    document.getElementById('result').textContent='Game over! The number was ' + randomNumber;
                    return;
                }
            const userGuess = parseInt(document.getElementById('guess').value);
            const resultElement = document.getElementById('result');

            if(userGuess === randomNumber) {
                resultElement.textContent = 'Congratulations! You guessed the number! in ' + tries + ' tries.';
            } else if (userGuess < randomNumber) {
                resultElement.textContent = 'Too low! Try again.';
            } else {
                resultElement.textContent = 'Too high! Try again.';
            }
        }
    </script>
</body>
</html>
